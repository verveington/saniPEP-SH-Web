# Local backend development only. Use the repository root compose.yaml for production-like runs.
services:
  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    ports:
      - "4100:4100"
    environment:
      NODE_ENV: development
      PORT: 4100
      PORTAL_BACKEND_BASE_URL: http://localhost:4100
      TRUSTED_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:5174
      PORTAL_DATABASE_URL: postgres://sanipep:replace-with-local-postgres-password@postgres:5432/sanipep_portal
      PORTAL_DATABASE_SSL: "false"
      POSTGRES_POOL_MAX: 10
      REDIS_URL: redis://redis:6379
      REDIS_TLS: "false"
      REDIS_KEY_PREFIX: sanipep:portal:local
      PORTAL_SESSION_COOKIE_NAME: sanipep_portal_session
      PORTAL_SESSION_SECRET: replace-with-local-session-secret-32-plus-chars
      CSRF_SECRET: replace-with-local-csrf-secret-32-plus-chars
      PORTAL_OTP_HASH_SECRET: replace-with-local-otp-hash-secret-32-plus-chars
      PORTAL_PASSWORD_PEPPER: replace-with-local-password-pepper-32-plus-chars
      AUDIT_LOG_HASH_SECRET: replace-with-local-audit-secret-32-plus-chars
      AV_SCANNER_MODE: stub-disabled
      OMNIA_WRITE_MODE: read_only
      PORTAL_STORE_PATH: /data/sanipep-portal-mvp-store.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_dev_store:/data

  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sanipep
      POSTGRES_PASSWORD: replace-with-local-postgres-password
      POSTGRES_DB: sanipep_portal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanipep -d sanipep_portal"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - backend_postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - backend_redis_data:/data

volumes:
  backend_dev_store:
  backend_postgres_data:
  backend_redis_data:
