name: sanipep-sh-staging

services:
  staging-proxy:
    profiles: ["staff-admin"]
    image: caddy:2.9-alpine
    restart: unless-stopped
    environment:
      STAGING_WEB_HOST: "${STAGING_WEB_HOST:-replace-with-owned-web-staging-host.invalid}"
      STAGING_STAFF_HOST: "${STAGING_STAFF_HOST:-replace-with-owned-staff-staging-host.invalid}"
      STAGING_API_HOST: "${STAGING_API_HOST:-replace-with-owned-api-staging-host.invalid}"
    ports:
      - "${STAGING_HTTP_PORT:-80}:80"
      - "${STAGING_HTTPS_PORT:-443}:443"
    volumes:
      - ./ops/caddy/staging/Caddyfile:/etc/caddy/Caddyfile:ro
      - staging_caddy_data:/data
      - staging_caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
      backend:
        condition: service_healthy
      staff-admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  staff-admin:
    profiles: ["staff-admin"]
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_PORTAL_BACKEND_URL: "${VITE_PORTAL_BACKEND_URL:?Set VITE_PORTAL_BACKEND_URL}"
    restart: unless-stopped
    ports:
      - "${STAFF_ADMIN_PORT:-5184}:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8080/ >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  staging_caddy_data:
  staging_caddy_config:
