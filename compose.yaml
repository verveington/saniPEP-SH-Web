name: sanipep-sh

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}"
      STRAPI_API_URL: "${STRAPI_API_URL:-}"
      STRAPI_API_TOKEN: "${STRAPI_API_TOKEN:-}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-4100}:4100"
    environment:
      NODE_ENV: development
      PORT: 4100
      PORTAL_BACKEND_BASE_URL: "${PORTAL_BACKEND_BASE_URL:-http://localhost:4100}"
      TRUSTED_ORIGINS: "${TRUSTED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5174}"
      PORTAL_DATABASE_URL: postgres://sanipep:sanipep-local@postgres:5432/sanipep_portal
      PORTAL_DATABASE_SSL: "false"
      POSTGRES_POOL_MAX: 10
      REDIS_URL: redis://redis:6379
      REDIS_TLS: "false"
      REDIS_KEY_PREFIX: sanipep:portal:local
      PORTAL_SESSION_COOKIE_NAME: sanipep_portal_session
      PORTAL_SESSION_SECRET: development-only-change-in-secret-store
      CSRF_SECRET: development-only-change-in-secret-store
      PORTAL_OTP_HASH_SECRET: development-only-change-in-secret-store
      PORTAL_PASSWORD_PEPPER: development-only-change-in-secret-store
      AUDIT_LOG_HASH_SECRET: development-only-change-in-secret-store
      AV_SCANNER_MODE: stub-disabled
      OMNIA_WRITE_MODE: read_only
      PORTAL_DEV_STORE_PATH: /data/sanipep-portal-mvp-store.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_dev_store:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4100/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: sanipep
      POSTGRES_PASSWORD: sanipep-local
      POSTGRES_DB: sanipep_portal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanipep -d sanipep_portal"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - backend_postgres_data:/var/lib/postgresql/data
      - ./apps/backend/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - backend_redis_data:/data

volumes:
  backend_dev_store:
  backend_postgres_data:
  backend_redis_data:
